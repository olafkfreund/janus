<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Janus API Gateway - Swagger UI</title>
  <link rel="stylesheet" type="text/css" href="/swagger-ui.css" />
  <style>
    html { box-sizing: border-box; }
    *, *:before, *:after { box-sizing: inherit; }
    body { 
      margin: 0; 
      background: hsl(222, 24%, 6%); 
      color: #fff; 
      font-family: sans-serif;
    }
    
    /* Elegant Dark-themed styling overrides for Swagger UI */
    .swagger-ui { 
      filter: invert(88%) hue-rotate(180deg); 
    }
    .swagger-ui .info {
      margin: 20px 0;
    }
    .swagger-ui .info .title {
      color: hsl(220, 100%, 10%);
    }
    .swagger-ui .scheme-container, .swagger-ui .servers-title, .swagger-ui select {
      background: #f0f0f0;
      color: #000;
      border-radius: 4px;
    }
    .swagger-ui .opblock .opblock-summary-method {
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>
  
  <!-- Load locally served static scripts -->
  <script src="/swagger-ui-bundle.js"></script>
  <script src="/swagger-ui-standalone-preset.js"></script>
  
  <script>
    window.onload = function() {
      // Resolve token from query parameters, hash, or localStorage
      const urlParams = new URLSearchParams(window.location.search);
      let token = urlParams.get('token');
      if (!token && window.location.hash) {
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        token = hashParams.get('token');
      }
      if (!token) {
        try {
          token = localStorage.getItem('token');
          if (!token) {
            const stateStr = localStorage.getItem('state');
            if (stateStr) {
              const state = JSON.parse(stateStr);
              token = state.token;
            }
          }
        } catch (e) {
          console.error("Failed to read localStorage token", e);
        }
      }

      const openApiUrl = token ? "/api/openapi.json?token=" + encodeURIComponent(token) : "/api/openapi.json";

      const ui = SwaggerUIBundle({
        url: openApiUrl,
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: "StandaloneLayout",
        requestInterceptor: function(req) {
          if (token) {
            req.headers['Authorization'] = 'Bearer ' + token;
          }
          return req;
        }
      });
      window.ui = ui;
    };
  </script>
</body>
</html>
