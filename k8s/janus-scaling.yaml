# Autoscaling + disruption budget for the stateless Postgres-backed gateway.
# Apply once out-of-band. The HPA owns the Deployment's replica count.
#
# IMPORTANT: pinned to 1 replica. The MCP HTTP+SSE transport is stateful — the
# SSE stream lives on one pod and responses are pushed back over it, so the
# /messages POST must reach that same pod. Horizontal scale-out of the SSE
# transport requires a shared message bus (e.g. Redis pub/sub keyed by sessionId)
# to deliver responses to the pod holding each stream — a planned follow-up.
# The portal/REST API is stateless and could scale independently if split out.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mcp-api-gateway
  namespace: janus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mcp-api-gateway
  minReplicas: 1
  maxReplicas: 1
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mcp-api-gateway
  namespace: janus
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: mcp-api-gateway
